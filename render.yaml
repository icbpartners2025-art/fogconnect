services:
  - type: web
    name: backend
    env: node
    plan: free
    rootDir: backend # Add this line
    buildCommand: npm install
    startCommand: node server.js # Removed 'backend/' prefix since rootDir is set
    envVars:
      - key: MONGO_URI
        value: mongodb+srv://fog_connect_db_user:MjLEylKWl7vW7u8D@fogconnect.e5jlvjj.mongodb.net/?appName=FogConnect
      - key: JWT_SECRET
        generateValue: true
      - key: FRONTEND_URL
        fromService:
          type: web
          name: frontend
          envVarKey: RENDER_EXTERNAL_URL
  
  - type: web
    name: frontend
    env: node
    plan: free
    rootDir: frontend # Add this line
    buildCommand: npm install && npm run build
    startCommand: npx serve -s build # Removed 'frontend/' prefix
    envVars:
      - key: REACT_APP_API_URL
        fromService:
          type: web
          name: backend
          envVarKey: RENDER_EXTERNAL_URL
